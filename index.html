<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Experience Map — James Kim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080a0f; --surface: #12151c; --border: #1e2230;
      --text: #e0e0e8; --muted: #b0b0c4; --dim: #a0a0b8;
      --cyan: #00ccff; --cyan-dim: rgba(0,204,255,0.15); --cyan-glow: rgba(0,204,255,0.35);
      --gold: #ffcc33; --gold-dim: rgba(255,204,51,0.15); --gold-glow: rgba(255,204,51,0.3);
      --purple: #b88aff; --purple-dim: rgba(153,102,255,0.12);
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); }

    /* ====== CANVAS AREA ====== */
    .map-viewport {
      width: 100%; height: 100%;
      position: relative; overflow: hidden;
      cursor: grab;
      background: radial-gradient(ellipse at center, #0d1018 0%, #060810 70%);
    }
    .map-viewport.dragging { cursor: grabbing; }
    .map-canvas {
      position: absolute; top: 0; left: 0;
      transform-origin: 0 0;
    }

    /* ====== LINES (SVG layer) ====== */
    .lines-layer {
      position: absolute; top: 0; left: 0;
      pointer-events: none;
      filter: drop-shadow(0 0 3px rgba(0,204,255,0.15));
    }
    .conn-line {
      stroke: rgba(0,204,255,0.12); stroke-width: 1;
      fill: none;
      transition: opacity 0.3s, stroke-width 0.3s, stroke 0.3s;
    }
    .conn-line.highlight { stroke: var(--cyan); stroke-width: 2; filter: drop-shadow(0 0 4px var(--cyan-glow)); opacity: 1; }
    .conn-line.data-flow {
      stroke: rgba(217,70,239,0.25); stroke-width: 1.5;
      stroke-dasharray: 12 8 4 8;
      animation: data-flow-anim 2s linear infinite;
    }
    .conn-line.data-flow.highlight {
      stroke: #d946ef; stroke-width: 2;
      filter: drop-shadow(0 0 4px rgba(217,70,239,0.3));
    }
    @keyframes data-flow-anim {
      to { stroke-dashoffset: -32; }
    }

    /* ====== NODES ====== */
    .node {
      position: absolute;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer;
      transition: transform 0.25s ease;
    }
    .node:hover { transform: scale(1.08); }
    .node.active { transform: scale(1.12); }

    .node-circle {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--dim);
      background: radial-gradient(circle at 35% 35%, #1a1e2a, #0c0e14);
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
    }

    /* ── Product node — small spoke ── */
    .node.product .node-circle {
      width: 44px; height: 44px;
      background: radial-gradient(circle at 35% 35%, #0a1e2a, #060e14);
      border: 1.5px solid rgba(0,204,255,0.25);
      box-shadow: 0 0 6px rgba(0,204,255,0.06);
    }
    .node.product:hover .node-circle,
    .node.product.active .node-circle {
      border-color: var(--cyan);
      box-shadow: 0 0 14px var(--cyan-glow), 0 0 30px rgba(0,204,255,0.08), inset 0 0 10px rgba(0,204,255,0.1);
    }

    /* ── User node — large hub ── */
    .node.user .node-circle {
      width: 96px; height: 96px;
      background: radial-gradient(circle at 40% 35%, #2a2210 0%, #1a1508 50%, #0e0a04 100%);
      border: 2.5px solid rgba(255,204,51,0.4);
      box-shadow: 0 0 20px rgba(255,204,51,0.1), 0 0 50px rgba(255,204,51,0.04), inset 0 0 20px rgba(255,204,51,0.06);
    }
    .node.user:hover .node-circle,
    .node.user.active .node-circle {
      border-color: var(--gold);
      box-shadow: 0 0 30px var(--gold-glow), 0 0 70px rgba(255,204,51,0.1), inset 0 0 24px rgba(255,204,51,0.12);
    }

    .node-icon { font-size: 1rem; color: var(--dim); }
    .node.product .node-icon { font-size: 0.95rem; color: var(--cyan); }
    .node.user .node-icon { font-size: 1.6rem; color: var(--gold); }
    .node-label {
      font-size: 0.62rem; font-weight: 600; color: rgba(224,224,232,0.88);
      text-align: center; max-width: 90px; line-height: 1.25;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    .node.user .node-label {
      font-size: 0.72rem; font-weight: 700; color: var(--gold);
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }

    /* ====== DETAIL PANEL ====== */
    .detail-panel {
      position: fixed; top: 80px; left: 24px; z-index: 50;
      width: 290px;
      background: rgba(12,15,22,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 1px rgba(0,204,255,0.2);
      padding: 1.75rem;
      opacity: 0; transform: translateX(-20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    .detail-panel.open {
      opacity: 1; transform: translateX(0);
      pointer-events: auto;
    }
    .detail-panel .dp-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; cursor: pointer;
      color: var(--dim); font-size: 1.2rem; padding: 4px;
      border-radius: 6px; transition: color 0.2s;
    }
    .detail-panel .dp-close:hover { color: var(--text); }
    .detail-panel .dp-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 0.15rem; }
    .detail-panel .dp-subtitle { font-size: 0.72rem; color: var(--dim); margin-bottom: 0.75rem; }
    .detail-panel .dp-desc { font-size: 0.76rem; color: var(--muted); line-height: 1.55; margin-bottom: 1rem; }
    .detail-panel .dp-section-title {
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--cyan); margin-bottom: 0.5rem;
    }
    .detail-panel .dp-list { list-style: none; margin-bottom: 1rem; }
    .detail-panel .dp-list li {
      font-size: 0.72rem; color: var(--muted); padding: 0.25rem 0;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .detail-panel .dp-list li .material-symbols-outlined { font-size: 0.9rem; color: var(--dim); }

    .dp-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.68rem; font-weight: 600; color: #fff;
      padding: 0.2rem 0.55rem; border-radius: 6px; margin-bottom: 0.4rem;
    }

    /* ====== TOOLBAR ====== */
    .toolbar {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 50; display: flex; gap: 4px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: saturate(180%) blur(24px); -webkit-backdrop-filter: saturate(180%) blur(24px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15), inset 0 -1px 0 rgba(255,255,255,0.05);
      padding: 6px;
    }
    .toolbar button {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 18px; border: none; border-radius: 10px;
      background: transparent; color: rgba(255,255,255,0.9);
      font-family: var(--sans); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .toolbar button:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .toolbar button.active { background: rgba(255,255,255,0.9); color: #080a0f; }
    .toolbar button .material-symbols-outlined { font-size: 1rem; }
    .toolbar button .material-symbols-outlined { font-size: 1rem; }

    /* ====== ZOOM CONTROLS ====== */
    .zoom-controls {
      position: fixed; bottom: 24px; right: 24px; z-index: 50;
      display: flex; flex-direction: column; gap: 0;
      background: rgba(12,15,22,0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .zoom-controls button {
      width: 40px; height: 40px; border: none;
      background: transparent; color: var(--dim);
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    .zoom-controls button:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .zoom-controls button + button { border-top: 1px solid var(--border); }

    /* Toolbar input mode (search/glossary inline) */
    .tb-input-mode {
      display: none; align-items: center; gap: 8px;
      flex: 1; position: relative;
    }
    .tb-input-mode.active { display: flex; }
    .tb-input-mode input {
      flex: 1; border: none; outline: none; background: none;
      font-family: var(--sans); font-size: 0.85rem; color: #fff;
      padding: 8px 0; min-width: 200px;
    }
    .tb-input-mode input::placeholder { color: rgba(255,255,255,0.72); }
    .tb-input-mode button {
      background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.75);
      padding: 4px; border-radius: 6px; display: flex; align-items: center; justify-content: center;
      transition: color 0.2s;
    }
    .tb-input-mode button:hover { color: #fff; background: transparent; }
    .tb-buttons { display: flex; align-items: center; gap: 4px; }
    .toolbar.input-active .tb-buttons { display: none; }
    .search-results {
      position: absolute; bottom: calc(100% + 12px); left: -14px; right: -14px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: saturate(180%) blur(24px); -webkit-backdrop-filter: saturate(180%) blur(24px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      margin-bottom: 8px; max-height: 320px; overflow-y: auto;
      display: none;
    }
    .search-results.has-results { display: block; }
    .search-result-item {
      padding: 10px 16px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      transition: background 0.15s;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(255,255,255,0.08); }
    .search-result-item .sri-icon {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .search-result-item .sri-icon.user { background: var(--gold-dim); }
    .search-result-item .sri-icon.product { background: var(--cyan-dim); }
    .search-result-item .sri-icon .material-symbols-outlined { font-size: 1rem; }
    .search-result-item .sri-icon.user .material-symbols-outlined { color: var(--gold); }
    .search-result-item .sri-icon.product .material-symbols-outlined { color: var(--cyan); }
    .search-result-item .sri-text { flex: 1; min-width: 0; }
    .search-result-item .sri-name { font-size: 0.82rem; font-weight: 600; color: var(--text); }
    .search-result-item .sri-match { font-size: 0.7rem; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .search-result-item { border-color: rgba(255,255,255,0.08); }
    .search-no-results { padding: 16px; font-size: 0.82rem; color: var(--dim); text-align: center; }

    /* Workflow infographic */
    .wf-flow { margin-top: 0.5rem; position: relative; padding-left: 20px; }
    .wf-flow::before {
      content: ''; position: absolute; left: 5px; top: 8px; bottom: 8px;
      width: 1px; background: linear-gradient(to bottom, var(--cyan), var(--dim));
      opacity: 0.3;
    }
    .wf-step { position: relative; padding: 0.4rem 0 0.4rem 16px; }
    .wf-step::before {
      content: ''; position: absolute; left: -20px; top: 0.65rem;
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--bg); border: 2px solid var(--cyan);
      box-shadow: 0 0 6px rgba(0,204,255,0.25);
    }
    .wf-step:last-child::after {
      content: ''; position: absolute; left: -17px; top: calc(0.65rem + 14px);
      width: 5px; height: 5px; border-right: 1.5px solid var(--cyan); border-bottom: 1.5px solid var(--cyan);
      transform: rotate(45deg); opacity: 0.5;
    }
    .wf-step .wf-num {
      font-size: 0.55rem; font-weight: 700; color: var(--cyan); letter-spacing: 0.08em;
      text-transform: uppercase; display: block; margin-bottom: 0.1rem;
    }
    .wf-step .wf-text { font-size: 0.7rem; color: var(--muted); line-height: 1.45; }
    .wf-step.wf-issue::before {
      border-color: #f87171; box-shadow: 0 0 6px rgba(239,68,68,0.3);
    }
    .wf-step.wf-issue .wf-num { color: #fb9a9a; }
    .wf-step.wf-issue .wf-text { color: #fca5a5; font-weight: 500; }
    /* Inferred alert */
    .wf-inferred-alert {
      margin-top: 0.5rem; margin-bottom: 0.75rem;
      padding: 0.65rem 0.75rem;
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.2);
      border-radius: 8px;
      display: flex; gap: 0.5rem; align-items: flex-start;
    }
    .wf-inferred-alert .material-symbols-outlined {
      font-size: 1rem; color: #fbbf24; flex-shrink: 0; margin-top: 1px;
    }
    .wf-inferred-alert p {
      font-size: 0.65rem; color: #fbbf24; line-height: 1.5;
    }
    .wf-inferred-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.55rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #fbbf24;
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2);
      padding: 0.15rem 0.45rem; border-radius: 4px; margin-left: 0.4rem;
    }
    .wf-inferred-tag .material-symbols-outlined { font-size: 0.7rem; }

    .wf-step.wf-data::before {
      border-color: #e879f9; box-shadow: 0 0 6px rgba(217,70,239,0.3);
      background: rgba(217,70,239,0.1);
    }
    .wf-step.wf-data .wf-num { color: #f0a0ff; }
    .wf-step.wf-data .wf-text { color: #f0abff; }

    /* Pain Points section */
    /* Pain points button */
    .dp-pain-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0.4rem 0.7rem;
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.18);
      border-radius: 6px; color: #fca5a5;
      font-family: var(--sans); font-size: 0.63rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .dp-pain-btn:hover { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.3); }
    .dp-pain-btn .material-symbols-outlined { font-size: 0.8rem; }
    .dp-pain-btn .pain-count {
      background: rgba(248,113,113,0.2); padding: 0.1rem 0.35rem;
      border-radius: 4px; font-size: 0.55rem;
    }
    /* Pain panel — right side */
    .pain-panel {
      position: fixed; top: 80px; left: 338px; z-index: 48;
      width: 300px; max-height: calc(100vh - 120px); overflow-y: auto;
      background: rgba(10,12,18,0.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(248,113,113,0.15); border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      padding: 1.5rem;
      opacity: 0; transform: translateX(-16px);
      transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none;
    }
    .pain-panel.open { opacity: 1; transform: translateX(0); pointer-events: auto; }
    .pain-panel .pp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .pain-panel .pp-title { font-size: 0.82rem; font-weight: 700; color: #fca5a5; }
    .pain-panel .pp-close { background: none; border: none; cursor: pointer; color: var(--dim); padding: 4px; border-radius: 6px; transition: color 0.2s; display: flex; align-items: center; }
    .pain-panel .pp-close:hover { color: var(--text); }
    .dp-pain-point {
      position: relative; padding: 0.5rem 0.65rem 0.5rem 1rem; margin-bottom: 0.4rem;
      background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.12);
      border-left: 3px solid rgba(239,68,68,0.4); border-radius: 6px;
      font-size: 0.68rem; color: #fca5a5; line-height: 1.5; font-style: italic;
    }
    .dp-pain-point::before {
      content: '\201C'; font-size: 1.1rem; color: rgba(248,113,113,0.35);
      position: absolute; top: 1px; left: 4px; font-style: normal;
    }
    .pain-panel::-webkit-scrollbar { width: 4px; }
    .pain-panel::-webkit-scrollbar-track { background: transparent; }
    .pain-panel::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    /* View All tools button */
    .dp-view-all-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 0.4rem; padding: 0.35rem 0.65rem;
      background: rgba(255,204,51,0.08); border: 1px solid rgba(255,204,51,0.18);
      border-radius: 6px; color: var(--gold);
      font-family: var(--sans); font-size: 0.63rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .dp-view-all-btn:hover { background: rgba(255,204,51,0.15); border-color: rgba(255,204,51,0.3); }
    .dp-view-all-btn .material-symbols-outlined { font-size: 0.8rem; }

    /* Tools expansion panel — right of detail panel */
    .tools-panel {
      position: fixed; top: 80px; left: 338px; z-index: 48;
      width: 300px; max-height: calc(100vh - 120px);
      overflow-y: auto;
      background: rgba(10,12,18,0.94);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 1px rgba(255,204,51,0.15);
      padding: 1.5rem;
      opacity: 0; transform: translateX(-16px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    .tools-panel.open { opacity: 1; transform: translateX(0); pointer-events: auto; }
    .tools-panel .tp-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .tools-panel .tp-title { font-size: 0.82rem; font-weight: 700; color: var(--text); }
    .tools-panel .tp-count { font-size: 0.62rem; color: var(--dim); }
    .tools-panel .tp-close {
      background: none; border: none; cursor: pointer;
      color: var(--dim); padding: 4px; border-radius: 6px;
      transition: color 0.2s; display: flex; align-items: center;
    }
    .tools-panel .tp-close:hover { color: var(--text); }
    .tools-panel .tp-item {
      display: flex; align-items: flex-start; gap: 0.5rem;
      padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .tools-panel .tp-item:last-child { border-bottom: none; }
    .tools-panel::-webkit-scrollbar { width: 4px; }
    .tools-panel::-webkit-scrollbar-track { background: transparent; }
    .tools-panel::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    /* Data flow section in detail panel */
    .dp-data-section { margin-top: 0.75rem; }
    .dp-data-houses { margin-bottom: 0.5rem; }
    .dp-data-houses span {
      display: inline-block; font-size: 0.58rem; font-weight: 500;
      color: #f0abff; background: rgba(217,70,239,0.08);
      border: 1px solid rgba(217,70,239,0.15); border-radius: 4px;
      padding: 0.12rem 0.4rem; margin: 0 3px 3px 0;
    }
    .dp-data-flow-item {
      display: flex; align-items: flex-start; gap: 0.35rem;
      padding: 0.25rem 0; font-size: 0.63rem; line-height: 1.4;
    }
    .dp-data-flow-item .df-arrow { flex-shrink: 0; font-size: 0.75rem; margin-top: 0px; }
    .dp-data-flow-item .df-arrow.sends { color: #f0a0ff; }
    .dp-data-flow-item .df-arrow.receives { color: var(--cyan); }
    .dp-data-flow-item .df-target { font-weight: 600; color: var(--text); }
    .dp-data-flow-item .df-type { color: var(--muted); }

    /* Workflow thumbnails grid */
    .wf-thumbs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 0.5rem; }
    .wf-thumb {
      padding: 0.6rem; border-radius: 8px;
      background: rgba(0,204,255,0.04); border: 1px solid rgba(0,204,255,0.12);
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-align: center;
    }
    .wf-thumb:hover { background: rgba(0,204,255,0.1); border-color: rgba(0,204,255,0.3); }
    .wf-thumb .material-symbols-outlined { font-size: 1.1rem; color: var(--cyan); }
    .wf-thumb .wf-thumb-name { font-size: 0.62rem; font-weight: 600; color: var(--text); line-height: 1.2; }
    .wf-thumb .wf-thumb-count { font-size: 0.52rem; color: var(--dim); }

  /* Draw lines */
  function drawLines() {
    linesSvg.innerHTML = '';

    /* Build a map of how many lines share each endpoint pair direction
       so we can offset overlapping lines with curves */
    var pairCount = {};
    var pairIndex = {};
    connections.forEach(function(c) {
      /* Create a canonical key for lines sharing the same two nodes */
      var key = [c[0], c[1]].sort().join('|');
      pairCount[key] = (pairCount[key] || 0) + 1;
    });

    /* Also count lines per node to compute angular offsets at connection points */
    var nodeLineIndices = {};
    connections.forEach(function(c, ci) {
      [c[0], c[1]].forEach(function(nid) {
        if (!nodeLineIndices[nid]) nodeLineIndices[nid] = [];
        nodeLineIndices[nid].push(ci);
      });
    });

    connections.forEach(function(c, ci) {
      var a = nMap[c[0]], b = nMap[c[1]];
      if (!a || !b) return;

      var aVis = currentFilter === 'all' || a.type === currentFilter;
      var bVis = currentFilter === 'all' || b.type === currentFilter;
      if (!aVis && !bVis) return;

      var isData = c[2] === 'data';
      var ar = a.type === 'user' ? 48 : 22;
      var br = b.type === 'user' ? 48 : 22;
      var x1 = a.x + ar, y1 = a.y + ar, x2 = b.x + br, y2 = b.y + br;
      var isHighlight = activeNodeId && (c[0] === activeNodeId || c[1] === activeNodeId);

      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.classList.add('conn-line');
      if (isData) line.classList.add('data-flow');
      if (isHighlight) line.classList.add('highlight');
      line.dataset.from = c[0];
      line.dataset.to = c[1];
      linesSvg.appendChild(line);

      /* Animated traveling dot for data flows */
      if (isData) {
        var pathD = 'M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2;
        var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('r', isHighlight ? 3 : 2);
        dot.setAttribute('fill', isHighlight ? '#f0a0ff' : 'rgba(217,70,239,0.6)');
        var anim = document.createElementNS('http://www.w3.org/2000/svg', 'animateMotion');
        anim.setAttribute('dur', '3s');
        anim.setAttribute('repeatCount', 'indefinite');
        anim.setAttribute('path', pathD);
        anim.setAttribute('begin', (Math.random() * 3).toFixed(1) + 's');
        dot.appendChild(anim);
        linesSvg.appendChild(dot);
      }
    });
  }

      if (isIssue) {

    html += '</div>';

      html += '<div class="swimlane-row">';
      html += '<div class="swimlane-lane-label"><span class="material-symbols-outlined">person</span>' + actor + '</div>';
      phases.forEach(function(phase, pi) {
        html += '<div class="swimlane-cell">';
        /* Find all actions for this actor in this phase */
        lanes.forEach(function(l) {
          if (l[0] === ai && l[1] === pi) {
            html += '<div class="swim-action' + (l[3] ? ' data' : '') + '">' + l[2] + '</div>';

        /* Add arrow if this actor has actions in the next phase too */
        var hasNext = lanes.some(function(l) { return l[0] === ai && l[1] === pi + 1; });

      });

  /* ========== PAN & ZOOM ========== */
  function applyTransform() {
    canvas.style.transform = 'translate(' + pan.x + 'px,' + pan.y + 'px) scale(' + scale + ')';
  }

  /* Smoothly animate pan to center a node (offset right to account for detail panel) */
  var animFrame = null;
  function centerOnNode(id) {
    var n = nMap[id];
    if (!n) return;

    /* Collect all related node IDs (this node + all connected nodes) */
    var relatedIds = [id];
    connections.forEach(function(c) {
      if (c[0] === id && nMap[c[1]]) relatedIds.push(c[1]);
      if (c[1] === id && nMap[c[0]]) relatedIds.push(c[0]);
    });

    /* Compute bounding box of all related nodes */
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    relatedIds.forEach(function(rid) {
      var rn = nMap[rid];
      if (!rn) return;
      var sz = rn.type === 'user' ? 96 : 44;
      if (rn.x < minX) minX = rn.x;
      if (rn.y < minY) minY = rn.y;
      if (rn.x + sz > maxX) maxX = rn.x + sz;
      if (rn.y + sz > maxY) maxY = rn.y + sz;
    });

    /* Add padding */
    var pad = 80;
    minX -= pad; minY -= pad; maxX += pad; maxY += pad;
    var contentW = maxX - minX;
    var contentH = maxY - minY;

    /* Account for detail panel on the left (290px + 24px margin) */
    var panelOffset = 330;
    var vw = window.innerWidth - panelOffset;
    var vh = window.innerHeight;

    /* Calculate target scale to fit all related nodes */
    var targetScale = Math.min(vw / contentW, vh / contentH, 1.2);
    targetScale = Math.max(0.3, Math.min(targetScale, 1.2));

    /* Calculate target pan to center the bounding box (offset for panel) */
    var targetX = panelOffset + (vw - contentW * targetScale) / 2 - minX * targetScale;
    var targetY = (vh - contentH * targetScale) / 2 - minY * targetScale;

    /* Animate to target */
    var startX = pan.x, startY = pan.y, startScale = scale;
    var startTime = null;
    var duration = 500;

    if (animFrame) cancelAnimationFrame(animFrame);

    function step(ts) {
      if (!startTime) startTime = ts;
      var t = Math.min((ts - startTime) / duration, 1);
      var ease = 1 - Math.pow(1 - t, 3);
      pan.x = startX + (targetX - startX) * ease;
      pan.y = startY + (targetY - startY) * ease;
      scale = startScale + (targetScale - startScale) * ease;
      applyTransform();
      if (t < 1) animFrame = requestAnimationFrame(step);
      else animFrame = null;
    }
    animFrame = requestAnimationFrame(step);
  }

  viewport.addEventListener('mousedown', function(e) {
    if (e.target.closest('.node')) return;

  });
  window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;

  window.zoomIn = function() { scale = Math.min(2, scale + 0.15); applyTransform(); };
  window.zoomOut = function() { scale = Math.max(0.3, scale - 0.15); applyTransform(); };
  window.zoomReset = function() {
    /* Calculate bounding box of all visible nodes */
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    var nodeSize = 90; /* node width/height including label */
    nodes.forEach(function(n) {
      var vis = currentFilter === 'all' || n.type === currentFilter;
      if (!vis) return;
      if (n.x < minX) minX = n.x;
      if (n.y < minY) minY = n.y;
      if (n.x + nodeSize > maxX) maxX = n.x + nodeSize;
      if (n.y + nodeSize > maxY) maxY = n.y + nodeSize;
    });
    if (minX === Infinity) { minX = 0; minY = 0; maxX = 1200; maxY = 800; }
    var contentW = maxX - minX + 120; /* padding */
    var contentH = maxY - minY + 120;
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var padding = 80;
    scale = Math.min((vw - padding * 2) / contentW, (vh - padding * 2) / contentH, 1.2);
    scale = Math.max(0.3, Math.min(scale, 1.2));
    pan.x = (vw - contentW * scale) / 2 - minX * scale + 60 * scale;
    pan.y = (vh - contentH * scale) / 2 - minY * scale + 60 * scale;
    applyTransform();
  };

  /* Build searchable index from all node data */
  function buildSearchText(n) {
    var parts = [n.label || '', n.id || '', n.type || ''];
    if (n.detail) {
      parts.push(n.detail.title || '');
      parts.push(n.detail.subtitle || '');
      parts.push(n.detail.desc || '');
      if (n.detail.hardware) parts = parts.concat(n.detail.hardware);
      if (n.detail.tools) {
        n.detail.tools.forEach(function(t) {
          parts.push(t.name || '');
          parts.push(t.desc || '');
        });
      }
    }
    return parts.join(' ').toLowerCase();
  }

  function findMatchContext(searchText, query) {
    var idx = searchText.indexOf(query);
    if (idx === -1) return '';
    var start = Math.max(0, idx - 20);
    var end = Math.min(searchText.length, idx + query.length + 30);
    var snippet = searchText.substring(start, end);
    if (start > 0) snippet = '...' + snippet;
    if (end < searchText.length) snippet = snippet + '...';
    return snippet;
  }

  searchInput.addEventListener('input', function() {
    var q = searchInput.value.trim().toLowerCase();
    if (!q) {
      searchResults.innerHTML = '';
      searchResults.classList.remove('has-results');
      return;
    }

    var matches = [];
    nodes.forEach(function(n) {
      var text = buildSearchText(n);
      if (text.indexOf(q) !== -1) {
        matches.push({ node: n, context: findMatchContext(text, q) });
      }
    });

    if (matches.length === 0) {
      searchResults.innerHTML = '<div class="search-no-results">No results for &ldquo;' + q.replace(/</g,'&lt;') + '&rdquo;</div>';
      searchResults.classList.add('has-results');
      return;
    }

    var html = '';
    matches.forEach(function(m) {
      var n = m.node;
      html += '<div class="search-result-item" data-id="' + n.id + '">';
      html += '<div class="sri-icon ' + n.type + '"><span class="material-symbols-outlined">' + (n.icon || 'circle') + '</span></div>';

  var glossaryMode = document.getElementById('glossary-mode');
  var glossaryInput = document.getElementById('glossary-input');
  var glossaryResults = document.getElementById('glossary-results');
  var glossaryBtn = document.getElementById('glossary-btn');
  var glossaryCloseBtn = document.getElementById('glossary-close');

  function openGlossary() {
    closeAllInputModes();
    toolbar.classList.add('input-active');
    glossaryMode.classList.add('active');
    glossaryInput.value = '';
    showGlossaryResults('');
    setTimeout(function() { glossaryInput.focus(); }, 50);
  }

  function closeGlossary() {
    closeAllInputModes();
    activeNodeId = null;
    detailPanel.classList.remove('open');
    currentFilter = 'all';
    filterBtn.innerHTML = '<span class="material-symbols-outlined">hub</span> All <span class="material-symbols-outlined" style="font-size:0.8rem;margin-left:2px;">expand_more</span>';
    filterMenu.querySelectorAll('button').forEach(function(b) { b.classList.toggle('active', b.dataset.filter === 'all'); });
    drawNodes();
    drawLines();
  }

  function showGlossaryResults(q) {
    q = q.toLowerCase().trim();
    var matches = glossary.filter(function(g) {
      if (!q) return true; /* show all when empty */
      return g.term.toLowerCase().indexOf(q) !== -1 || g.def.toLowerCase().indexOf(q) !== -1;
    });

    if (matches.length === 0) {
      glossaryResults.innerHTML = '<div class="search-no-results">No matches for \u201c' + q.replace(/</g,'&lt;') + '\u201d</div>';
      glossaryResults.classList.add('has-results');
      return;
    }

    /* Limit to 30 if showing all */
    var display = q ? matches : matches.slice(0, 30);
    var html = '';
    display.forEach(function(g) {
      html += '<div class="search-result-item glossary-item">';
      html += '<div class="sri-icon product"><span style="font-size:0.7rem;font-weight:700;color:var(--cyan);">' + g.term.substring(0,3) + '</span></div>';
      html += '<div class="sri-text">';
      html += '<p class="sri-name">' + g.term + '</p>';
      html += '<p class="sri-match" style="white-space:normal;">' + g.def + '</p>';
      html += '</div></div>';
    });
    if (!q && matches.length > 30) {
      html += '<div class="search-no-results" style="font-size:0.7rem;">Type to search all ' + matches.length + ' terms</div>';
    }
    glossaryResults.innerHTML = html;
    glossaryResults.classList.add('has-results');
  }

  glossaryBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    openGlossary();
  });

  glossaryCloseBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    closeGlossary();
  });

  glossaryInput.addEventListener('input', function() {
    showGlossaryResults(glossaryInput.value);
  });

  /* Glossary escape already handled by the main escape handler above */

  /* ========== INIT ========== */
  drawNodes();
  drawLines();
  zoomReset();
  applyTransform();

})();
</script>
